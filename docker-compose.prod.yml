services:
  mailhub-postgres:
    image: postgres:16-alpine
    container_name: mailhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailhub
      POSTGRES_USER: mailhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - mailhub_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ativaai

  mailhub-redis:
    image: redis:7-alpine
    container_name: mailhub-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - mailhub_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ativaai

  mailhub-backend:
    image: ghcr.io/labsativai/mailhub-backend:latest
    container_name: mailhub-backend
    restart: unless-stopped
    depends_on:
      mailhub-postgres:
        condition: service_healthy
      mailhub-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
    networks:
      - ativaai

  mailhub-worker:
    image: ghcr.io/labsativai/mailhub-worker:latest
    container_name: mailhub-worker
    restart: unless-stopped
    depends_on:
      mailhub-postgres:
        condition: service_healthy
      mailhub-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NODE_ENV: ${NODE_ENV}
    networks:
      - ativaai

  mailhub-frontend:
    image: ghcr.io/labsativai/mailhub-frontend:latest
    container_name: mailhub-frontend
    restart: unless-stopped
    depends_on:
      - mailhub-backend
    volumes:
      - ./config/mailhub-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ativaai

volumes:
  mailhub_postgres:
  mailhub_redis:

networks:
  ativaai:
    external: true
