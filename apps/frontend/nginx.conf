server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 30M;

  # SPA fallback — DEVE ser o último location
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}