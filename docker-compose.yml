services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mailhub
      POSTGRES_USER: mailhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mailhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  backend:
    build:
      context: ./apps/backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://mailhub:${POSTGRES_PASSWORD:-mailhub}@postgres:5432/mailhub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGIN: http://localhost:5173
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["full"]

  worker:
    build:
      context: ./apps/worker
    environment:
      DATABASE_URL: postgresql://mailhub:${POSTGRES_PASSWORD:-mailhub}@postgres:5432/mailhub
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["full"]

  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "8080:80"
    depends_on:
      - backend
    profiles: ["full"]

volumes:
  postgres_data:

networks:
  default:
    name: mailhub-dev
