services:
  mailhub-postgres:
    image: postgres:16-alpine
    container_name: mailhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailhub
      POSTGRES_USER: mailhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - mailhub_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailhub -d mailhub"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "5432:5432"
    networks:
      - ativaai

  mailhub-redis:
    image: redis:7-alpine
    container_name: mailhub-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - mailhub_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ativaai

  mailhub-backend:
    image: ghcr.io/labsativai/mailhub-backend:latest
    container_name: mailhub-backend
    restart: unless-stopped
    depends_on:
      mailhub-postgres:
        condition: service_healthy
      mailhub-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - ativaai

  mailhub-worker:
    image: ghcr.io/labsativai/mailhub-worker:latest
    container_name: mailhub-worker
    restart: unless-stopped
    depends_on:
      mailhub-postgres:
        condition: service_healthy
      mailhub-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NODE_ENV: ${NODE_ENV}
      IMAP_PROXY_URL: ${IMAP_PROXY_URL:-}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - ativaai

  mailhub-frontend:
    image: ghcr.io/labsativai/mailhub-frontend:latest
    container_name: mailhub-frontend
    restart: unless-stopped
    depends_on:
      - mailhub-backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - ativaai

volumes:
  mailhub_postgres:
  mailhub_redis:

networks:
  ativaai:
    external: true
